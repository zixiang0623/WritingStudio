<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WritingStudio - 執筆専用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-bg: #FFFFFF;
            --color-surface: #FAFAF8;
            --color-surface-light: #F5F5F5;
            --color-text: #1A1A1A;
            --color-text-secondary: #6B7280;
            --color-accent: #6366F1;
            --color-accent-light: #EEF2FF;
            --color-border: #E5E5E5;
            --color-success: #10B981;
            --color-danger: #EF4444;
            --color-warning: #F59E0B;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.07);
            --shadow-lg: 0 10px 15px rgba(0,0,0,0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            height: 100vh;
            overflow: hidden;
            line-height: 1.6;
            transition: background-color 0.2s ease-out, color 0.2s ease-out;
        }

        /* Background themes */
        body.bg-white { 
            background-color: #FFFFFF;
            --color-bg: #FFFFFF;
            --color-surface: #FAFAF8;
            --color-border: #E5E5E5;
            --color-text: #1A1A1A;
            color: #1A1A1A;
        }
        body.bg-cream { 
            background-color: #FAF6EE;
            --color-bg: #FAF6EE;
            --color-surface: #F5EFE3;
            --color-border: #E8DFD0;
            --color-text: #2D2416;
            color: #2D2416;
        }
        body.bg-gray { 
            background-color: #F0F0F0;
            --color-bg: #F0F0F0;
            --color-surface: #E8E8E8;
            --color-border: #D8D8D8;
            --color-text: #1A1A1A;
            color: #1A1A1A;
        }
        body.bg-dark { 
            background-color: #1E1E1E;
            --color-bg: #1E1E1E;
            --color-surface: #2A2A2A;
            --color-border: #3A3A3A;
            --color-text: #E5E5E5;
            color: #E5E5E5;
        }
        body.bg-mint { 
            background-color: #EFFAF6;
            --color-bg: #EFFAF6;
            --color-surface: #E0F3EA;
            --color-border: #C8E6DC;
            --color-text: #1A3A2E;
            color: #1A3A2E;
        }

        /* Font themes */
        body.font-serif textarea, body.font-serif .ghost-overlay, body.font-serif .typo-overlay { font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'MS PMincho', serif; }
        body.font-mincho textarea, body.font-mincho .ghost-overlay, body.font-mincho .typo-overlay { font-family: 'Georgia', 'Times New Roman', serif; }
        body.font-rounded textarea, body.font-rounded .ghost-overlay, body.font-rounded .typo-overlay { font-family: 'Hiragino Maru Gothic ProN', 'UD Digi Kyokasho N-R', 'Comic Sans MS', sans-serif; }
        body.font-mono textarea, body.font-mono .ghost-overlay, body.font-mono .typo-overlay { font-family: 'SF Mono', 'MS Gothic', Consolas, monospace; }

        /* Layout */
        .container {
            display: flex;
            height: 100vh;
            background: var(--color-bg);
            transition: background-color 0.2s ease-out;
        }

        .sidebar {
            display: none;
        }

        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            padding: 20px 32px;
            border-bottom: 1px solid var(--color-border);
            display: none;
            justify-content: space-between;
            align-items: center;
            background: var(--color-bg);
            animation: fadeIn 0.5s ease-out;
        }

        .title-area {
            flex: 1;
        }

        .document-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
            color: var(--color-text);
        }

        .document-title:hover {
            color: var(--color-accent);
        }

        .document-info {
            font-size: 13px;
            color: var(--color-text-secondary);
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .editor-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 40px;
            position: relative;
        }

        .editor-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* AI作動中の虹色光沢ボーダーアニメーション */
        @keyframes liquid-slide {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes liquid-glow-pulse {
            0%, 100% { opacity: 0.9; }
            50%       { opacity: 1;   }
        }

        .editor-wrapper.ai-active::before,
        .editor-wrapper.ai-active::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 14px;
            z-index: 0;
        }

        .editor-wrapper.ai-active::before {
            background: linear-gradient(
                270deg,
                #ff0080, #ff4500, #ffcc00,
                #00ff88, #00cfff, #7b2fff,
                #ff0080, #ff4500
            );
            background-size: 400% 400%;
            animation: liquid-slide 3s ease infinite, liquid-glow-pulse 2s ease-in-out infinite;
        }

        .editor-wrapper.ai-active::after {
            inset: 0px;
            background: linear-gradient(
                270deg,
                rgba(255,0,128,0.3), rgba(255,69,0,0.3), rgba(255,204,0,0.3),
                rgba(0,255,136,0.3), rgba(0,207,255,0.3), rgba(123,47,255,0.3),
                rgba(255,0,128,0.3), rgba(255,69,0,0.3)
            );
            background-size: 400% 400%;
            animation: liquid-slide 3s ease infinite;
            filter: blur(10px);
            border-radius: 16px;
            z-index: 0;
        }

        .editor-wrapper.ai-active textarea {
            position: relative;
            z-index: 1;
            border-color: transparent;
        }

        textarea {
            flex: 1;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 16px;
            line-height: 1.8;
            border: 1px solid var(--color-border);
            border-radius: 12px;
            background: var(--color-surface);
            color: var(--color-text);
            resize: none;
            outline: none;
            transition: background-color 0.2s ease-out, color 0.2s ease-out, border-color 0.2s ease-out;
            letter-spacing: 0.3px;
        }

        textarea:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px var(--color-accent-light);
        }

        /* Stats Bar */
        .stats-trigger {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 456px;
            height: 50px;
            z-index: 39;
        }

        .stats-bar {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%) scale(0.85);
            width: auto;
            padding: 10px 20px;
            background: rgba(26, 26, 26, 0.8);
            border-radius: 999px;
            display: flex;
            align-items: center;
            gap: 20px;
            opacity: 0;
            transition: opacity 0.25s ease-out, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            z-index: 40;
            box-shadow: var(--shadow-lg);
        }

        .stats-trigger:hover .stats-bar {
            opacity: 1;
            transform: translateX(-50%) scale(1);
            pointer-events: auto;
        }

        .settings-trigger {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 456px;
            height: 50px;
            z-index: 39;
        }

        .settings-bar {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%) scale(0.85);
            width: auto;
            padding: 10px 20px;
            background: rgba(26, 26, 26, 0.8);
            border-radius: 999px;
            display: flex;
            align-items: center;
            gap: 16px;
            opacity: 0;
            transition: opacity 0.25s ease-out, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            z-index: 40;
            box-shadow: var(--shadow-lg);
            overflow: visible;
            white-space: nowrap;
        }

        .settings-trigger:hover .settings-bar {
            opacity: 1;
            transform: translateX(-50%) scale(1);
            pointer-events: auto;
        }

        .settings-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .settings-group span {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            white-space: nowrap;
        }

        .settings-bar select {
            display: none;
        }

        .swatch-row {
            display: flex;
            gap: 6px;
        }

        .bg-swatch {
            width: 26px;
            height: 26px;
            border-radius: 7px;
            border: 2px solid rgba(255,255,255,0.15);
            cursor: pointer;
            transition: var(--transition);
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bg-swatch-inner {
            width: 100%;
            height: 100%;
            border-radius: 3px;
        }

        .bg-swatch.active {
            border-color: var(--color-accent);
        }

        .font-swatch {
            width: 26px;
            height: 26px;
            border-radius: 7px;
            border: 2px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.1);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: var(--transition);
            padding: 0;
        }

        .font-swatch.active {
            border-color: var(--color-accent);
            background: rgba(99,102,241,0.25);
        }

        .bg-swatch[data-bg="dark"] {
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1);
        }

        .stats-bar .stat-item {
            display: flex;
            align-items: baseline;
            gap: 5px;
            padding: 0;
            white-space: nowrap;
        }

        .stats-bar .stat-number {
            color: #fff;
            font-size: 14px;
        }

        .stats-bar .stat-label {
            color: rgba(255,255,255,0.5);
            font-size: 10px;
            margin-top: 0;
        }

        .stat-item {
            text-align: center;
            padding: 8px 0;
        }

        .stat-number {
            font-size: 20px;
            font-weight: 700;
            color: var(--color-accent);
            font-feature-settings: "tnum";
        }

        .stat-label {
            font-size: 11px;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-top: 2px;
            font-weight: 500;
        }

        .btn-export {
            padding: 6px 10px;
            font-size: 12px;
            background: var(--color-accent);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            white-space: nowrap;
        }

        .btn-export:hover {
            background: #5558E3;
        }

        .goal-input-row {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .goal-input-row input {
            width: 90px;
            padding: 5px 8px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            font-size: 12px;
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .goal-input-row input::-webkit-outer-spin-button,
        .goal-input-row input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .goal-input-row input[type=number] {
            -moz-appearance: textfield;
        }

        .goal-input-row button {
            padding: 5px 8px;
            font-size: 12px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            cursor: pointer;
            color: #fff;
            white-space: nowrap;
        }

        .goal-ring-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .goal-ring {
            width: 56px;
            height: 32px;
            flex-shrink: 0;
            position: relative;
        }

        .goal-ring svg {
            width: 100%;
            height: 100%;
        }

        .goal-ring-track {
            fill: none;
            stroke: rgba(255,255,255,0.2);
            stroke-width: 4;
        }

        .goal-ring-progress {
            fill: none;
            stroke: var(--color-accent);
            stroke-width: 4;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.3s ease-out;
        }

        .goal-ring-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 9px;
            font-weight: 700;
            color: #fff;
        }

        .goal-text {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            white-space: nowrap;
        }

        .goal-clear {
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            font-size: 10px;
            cursor: pointer;
            text-decoration: underline;
            white-space: nowrap;
        }

        /* Goal achieved toast */
        .goal-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--color-success);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s ease-out, transform 0.3s ease-out;
            pointer-events: none;
            z-index: 100;
        }

        .goal-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* AI機能群 */
        /* ===== Recall Island (左辺) ===== */
        .recall-trigger {
            position: fixed;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 280px;
            z-index: 39;
        }

        .recall-bar {
            position: fixed;
            left: 12px;
            top: 50%;
            transform: translateY(-50%) translateX(-12px) scale(0.92);
            width: 36px;
            background: rgba(26,26,26,0.82);
            border-radius: 999px;
            padding: 10px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease-out, transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
            box-shadow: var(--shadow-lg);
            z-index: 40;
            user-select: none;
            max-height: 70vh;
        }

        .recall-trigger:hover .recall-bar,
        .recall-bar.force-show {
            opacity: 1;
            transform: translateY(-50%) translateX(0) scale(1);
            pointer-events: auto;
        }

        .recall-label {
            font-size: 9px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 6px;
            writing-mode: horizontal-tb;
        }

        .recall-slider-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 4px 0;
            position: relative;
            user-select: none;
        }

        .recall-track {
            width: 4px;
            height: 180px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }

        .recall-track-fill {
            display: none;
        }

        .recall-thumb {
            position: absolute;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--color-accent);
            box-shadow: 0 0 6px var(--color-accent);
            cursor: grab;
            transition: top 0.1s ease;
        }

        .recall-thumb:active { cursor: grabbing; }

        .recall-time-display {
            font-size: 9px;
            color: rgba(255,255,255,0.7);
            margin-top: 6px;
            text-align: center;
            min-height: 24px;
            line-height: 1.4;
            white-space: nowrap;
        }

        .recall-count {
            font-size: 9px;
            color: rgba(255,255,255,0.35);
            margin-top: 2px;
        }

        .recall-save-btn {
            margin-top: 8px;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 1;
            text-transform: none;
            letter-spacing: 0;
            font-weight: 400;
            transition: background 0.15s ease, transform 0.15s ease;
        }

        .recall-save-btn:hover {
            background: rgba(99,102,241,0.35);
            border-color: var(--color-accent);
            transform: scale(1.1);
        }

        .recall-save-btn.saved {
            background: rgba(16,185,129,0.35);
            border-color: var(--color-success);
        }

        .recall-hint {
            position: fixed;
            left: 56px;
            bottom: 8px;
            font-size: 11px;
            color: var(--color-text-secondary);
            background: var(--color-surface);
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid var(--color-border);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 50;
        }

        .recall-hint.show {
            opacity: 0.9;
        }

        /* Recall プレビュー時のtextareaオーバーレイ */
        .recall-overlay {
            position: absolute;
            inset: 0;
            padding: 20px;
            border: 1px solid transparent;
            font-size: 16px;
            line-height: 1.8;
            letter-spacing: 0.3px;
            font-family: inherit;
            white-space: pre-wrap;
            word-wrap: break-word;
            pointer-events: none;
            color: transparent;
            overflow: hidden;
            z-index: 3;
        }

        .recall-preview-text {
            color: var(--color-text-secondary);
            opacity: 0.6;
        }

        /* Recallプレビュー中はtextareaのテキストを非表示 */
        .editor-wrapper.recall-previewing textarea {
            color: transparent;
            caret-color: transparent;
        }

        .editor-wrapper.recall-previewing .recall-overlay {
            pointer-events: none;
        }

        /* 設定ペイン内のRecall間隔設定 */
        .recall-interval-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

        .recall-interval-row label {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            white-space: nowrap;
        }

        .recall-interval-btns {
            display: flex;
            gap: 4px;
            flex-wrap: nowrap;
            align-items: center;
        }

        .recall-interval-btns .recall-interval-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.7);
            border-radius: 6px;
            padding: 3px 7px !important;
            font-size: 10px;
            line-height: 1.4;
            text-transform: none;
            letter-spacing: 0;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .recall-interval-btns .recall-interval-btn.active {
            background: var(--color-accent);
            border-color: var(--color-accent);
            color: #fff;
        }

        .recall-settings-row .recall-clear-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.5);
            border-radius: 6px;
            padding: 3px 8px !important;
            font-size: 10px;
            line-height: 1.4;
            text-transform: none;
            letter-spacing: 0;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
        }

        .recall-settings-row .recall-clear-btn:hover {
            background: rgba(239,68,68,0.2);
            border-color: rgba(239,68,68,0.4);
            color: #ff6b6b;
        }

        .recall-settings-row {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: nowrap;
        }

        .recall-settings-label {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            white-space: nowrap;
        }

        .ai-trigger {
            position: fixed;
            top: 0;
            right: 0;
            width: 228px;
            height: 85.5px;
            z-index: 39;
        }

        .ai-bar {
            position: fixed;
            top: 12px;
            right: 20px;
            padding: 8px 12px;
            background: rgba(26, 26, 26, 0.8);
            border-radius: 999px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transform: translateY(-10px) scale(0.9);
            transition: opacity 0.25s ease-out, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            z-index: 40;
            box-shadow: var(--shadow-lg);
        }

        .ai-trigger:hover .ai-bar,
        .ai-bar.force-show {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .ai-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            position: relative;
        }

        .ai-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .ai-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .ai-btn.loading::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--color-accent);

    <script>
        // ============================================
        // ストレージ層
        // 設定: localStorage
        // Recallスナップショット: SQLite Wasm + OPFS
        //   ※ http(s)://環境必須。file://では自動的にlocalStorageにフォールバック
        // ============================================

        let _useOpfs = false; // OPFS初期化成功フラグ
        let _worker  = null;  // SQLite Wasm Worker

        // --- localStorage ラッパー（設定・フォールバック共用） ---
        function lsGet(key)         { return localStorage.getItem('ws_' + key) ?? undefined; }
        function lsSet(key, value)  { localStorage.setItem('ws_' + key, String(value)); }
        function lsDel(key)         { localStorage.removeItem('ws_' + key); }

        // --- スナップショットのlocalStorage版（フォールバック） ---
        function snapshotLoadLS() {
            try { return JSON.parse(localStorage.getItem('ws_snapshots') || '[]'); }
            catch(e) { return []; }
        }
        function snapshotSaveLS(arr) {
            const trimmed = arr.slice(0, 50);
            try { localStorage.setItem('ws_snapshots', JSON.stringify(trimmed)); }
            catch(e) {
                const half = trimmed.slice(0, Math.floor(trimmed.length / 2));
                try { localStorage.setItem('ws_snapshots', JSON.stringify(half)); } catch(e2) {}
            }
        }

        // --- SQLite Wasm Worker初期化 ---
        async function opfsInit() {
            // Workerを使ったSQLite Wasm（OPFSアクセスにはWorkerが必要）
            const workerUrl = 'https://cdn.jsdelivr.net/npm/@sqlite.org/sqlite-wasm@3.46.1-build1/sqlite-wasm/jswasm/sqlite3-worker1.js';

            return new Promise((resolve) => {
                let ready = false;
                const w = new Worker(workerUrl, { type: 'classic' });

                const timeout = setTimeout(() => {
                    if (!ready) { w.terminate(); resolve(false); }
                }, 8000);

                w.onmessage = async (e) => {
                    const msg = e.data;
                    if (msg.type === 'sqlite3-api' && msg.result === 'worker1-ready') {
                        ready = true;
                        clearTimeout(timeout);
                        // DBをopen
                        w.postMessage({ type: 'open', args: { filename: 'file:writingstudio.db?vfs=opfs' } });
                    } else if (msg.type === 'open') {
                        if (msg.result?.dbId) {
                            _worker = w;
                            _dbId = msg.result.dbId;
                            // テーブル作成
                            await workerExec(`
                                CREATE TABLE IF NOT EXISTS snapshots (
                                    id INTEGER PRIMARY KEY AUTOINCREMENT,
                                    ts INTEGER NOT NULL,
                                    content TEXT NOT NULL
                                );
                                CREATE INDEX IF NOT EXISTS idx_ts ON snapshots(ts DESC);
                            `);
                            _useOpfs = true;
                            resolve(true);
                        } else {
                            w.terminate();
                            resolve(false);
                        }
                    } else if (msg.type === 'error') {
                        w.terminate();
                        resolve(false);
                    }
                };
                w.onerror = () => { clearTimeout(timeout); resolve(false); };
            });
        }

        let _dbId = null;
        let _msgId = 0;

        function workerExec(sql, bind) {
            return new Promise((resolve, reject) => {
                const id = ++_msgId;
                const handler = (e) => {
                    if (e.data.messageId !== id) return;
                    _worker.removeEventListener('message', handler);
                    if (e.data.type === 'error') reject(new Error(e.data.result?.message || 'exec error'));
                    else resolve(e.data.result);
                };
                _worker.addEventListener('message', handler);
                _worker.postMessage({
                    type: 'exec',
                    messageId: id,
                    args: { dbId: _dbId, sql, bind: bind || [], rowMode: 'array' }
                });
            });
        }

        // --- 後方互換エイリアス（settings系はlocalStorage固定） ---
        async function idbPut(store, value, key) { lsSet(key, value); }
        async function idbDelete(store, key)     { lsDel(key); }

        // ============================================
        // Recallスナップショット操作（OPFS or localStorage）
        // ============================================
        async function snapshotInsert(ts, content) {
            if (_useOpfs) {
                await workerExec(
                    'INSERT INTO snapshots(ts,content) VALUES(?,?)',
                    [ts, content]
                );
                // 100件超えたら古いものを削除
                await workerExec(
                    'DELETE FROM snapshots WHERE id NOT IN (SELECT id FROM snapshots ORDER BY ts DESC LIMIT 100)'
                );
            } else {
                const arr = snapshotLoadLS();
                arr.unshift({ id: ts, ts, content });
                snapshotSaveLS(arr);
            }
        }

        async function snapshotLoadAll() {
            if (_useOpfs) {
                const result = await workerExec(
                    'SELECT id,ts,content FROM snapshots ORDER BY ts DESC LIMIT 100'
                );
                return (result?.resultRows || []).map(r => ({ id: r[0], ts: r[1], content: r[2] }));
            } else {
                return snapshotLoadLS();
            }
        }

        async function snapshotClearAll() {
            if (_useOpfs) {
                await workerExec('DELETE FROM snapshots');
            } else {
                snapshotSaveLS([]);
            }
        }

        // ============================================
        // State Management
        // ============================================
        let content    = '';

        let goalAchievedShown = false;

        document.addEventListener('DOMContentLoaded', async () => {

        function applyBg(val) {
            document.body.classList.remove('bg-white','bg-cream','bg-gray','bg-dark','bg-mint');
            document.body.classList.add('bg-' + val);
            idbPut('settings', val, 'bgTheme');

            document.querySelectorAll('.font-swatch').forEach(el => el.classList.remove('active'));
            document.querySelector(`.font-swatch[data-font="${val}"]`).classList.add('active');

        // Stats Update
        function updateStats() {
            const text = document.getElementById('editor').value;
            
            const charCount = text.length;
            document.getElementById('charCount').textContent = charCount.toLocaleString('ja-JP');

            const lineCount = text ? text.split('\n').length : 0;
            document.getElementById('lineCount').textContent = lineCount;

            const wordCount = countWords(text);
            document.getElementById('wordCount').textContent = wordCount;

            const readTime = Math.ceil(charCount / 300);
            document.getElementById('readTime').textContent = readTime + '分';

            updateGoalProgress(charCount);
        }

        function updateGoalProgress(charCount) {
            const inputRow = document.getElementById('goalInputRow');
            const ringWrap = document.getElementById('goalRingWrap');

            if (goalTarget > 0) {
                inputRow.style.display = 'none';
                ringWrap.style.display = 'flex';

                const pct = Math.min(Math.round((charCount / goalTarget) * 100), 100);
                document.getElementById('goalRingProgress').style.strokeDashoffset = (100 - pct);
                document.getElementById('goalRingText').textContent = pct + '%';
                document.getElementById('goalText').textContent = `${charCount.toLocaleString('ja-JP')} / ${goalTarget.toLocaleString('ja-JP')}字`;

                if (charCount >= goalTarget && !goalAchievedShown) {
                    goalAchievedShown = true;
                    showGoalToast();
                } else if (charCount < goalTarget) {
                    goalAchievedShown = false;
                }
            } else {
                inputRow.style.display = 'flex';
                ringWrap.style.display = 'none';
            }
        }

        function setGoalTarget() {
            const val = parseInt(document.getElementById('goalInput').value);
            if (!val || val <= 0) return;
            goalTarget = val;
            goalAchievedShown = false;
            idbPut('settings', goalTarget, 'goalTarget');
            updateStats();
        }

        function clearGoalTarget() {
            goalTarget = 0;
            idbDelete('settings', 'goalTarget');
            document.getElementById('goalInput').value = '';
            updateStats();
        }

        function showGoalToast() {
            const toast = document.getElementById('goalToast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        const wordSegmenter = (typeof Intl !== 'undefined' && Intl.Segmenter)
            ? new Intl.Segmenter('ja', { granularity: 'word' })
            : null;

        function countWords(text) {
            if (!text) return 0;
            if (wordSegmenter) {
                let count = 0;
                for (const seg of wordSegmenter.segment(text)) {
                    if (seg.isWordLike) count++;
                }
                return count;
            }
            // Intl.Segmenter非対応ブラウザ向けフォールバック
            const hiragana = text.match(/[\u3040-\u309F]/g) || [];
            const katakana = text.match(/[\u30A0-\u30FF]/g) || [];
            const kanji = text.match(/[\u4E00-\u9FFF]/g) || [];
            const english = text.match(/[a-zA-Z]+/g) || [];
            return Math.max(1, Math.floor((hiragana.length + katakana.length + kanji.length) / 3 + english.length));
        }

        // Auto Save（本文をsettingsテーブルに保存）
        function autoSave() {
            content = document.getElementById('editor').value;
            lsSet('writing', content);
        }

        // saveAll: autoSave + recallSave を両方実行する統一保存関数
        async function saveAll() {

            await recallSave();
        }

        function exportMD() {
            const text = document.getElementById('editor').value;
            const md = text;

            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = '執筆.md';
            link.click();
        }

        // Export & Download

        // ============================================
        // AI機能（Gemini API / キーはlocalStorageにのみ保存）
        // ============================================

        const GEMINI_MODEL = 'gemini-2.5-flash';
        let apiKeySet = false; // IDB起動後に復元
        let _cachedApiKey = '';
        let ghostText = '';
        let typoIssues = [];
        let typoCheckTimer = null;

        document.addEventListener('DOMContentLoaded', () => {
            updateKeyBtnState();
            const aiKeyPanel = document.getElementById('aiKeyPanel');
            const aiBar = document.getElementById('aiBar');

            aiKeyPanel.addEventListener('mouseenter', () => aiBar.classList.add('force-show'));
            aiKeyPanel.addEventListener('mouseleave', () => updateAiBarForceShow());
        });

        function updateAiBarForceShow() {
            const aiKeyPanel = document.getElementById('aiKeyPanel');
            const aiBar = document.getElementById('aiBar');
            aiBar.classList.toggle('force-show', aiKeyPanel.classList.contains('show'));
        }

        function updateKeyBtnState() {
            const btn = document.getElementById('aiKeyBtn');
            btn.classList.toggle('set', apiKeySet);
        }

        function toggleKeyPanel() {
            document.getElementById('aiKeyPanel').classList.toggle('show');
            updateAiBarForceShow();
        }

        function saveApiKey() {
            const val = document.getElementById('aiKeyInput').value.trim();
            if (!val) return;
            idbPut('settings', val, 'geminiApiKey');
            _cachedApiKey = val;
            apiKeySet = true;
            document.getElementById('aiKeyInput').value = '';
            updateKeyBtnState();

            // APIキー登録時：虹色グローを一瞬当てる（AI実行時と同じ）
            const panel = document.getElementById('aiKeyPanel');
            panel.classList.remove('show');
            updateAiBarForceShow();
            setAiActive(true);
            setTimeout(() => setAiActive(false), 1200);
        }

        function getApiKey() {
            // IDB同期取得は不可のため、起動時にキャッシュした値を使う
            return _cachedApiKey || '';
        }

        // Gemini API 呼び出し共通関数
        async function callGemini(prompt) {
            const apiKey = getApiKey();
            if (!apiKey) {
                toggleKeyPanel();
                throw new Error('APIキーが未設定です');
            }

            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${encodeURIComponent(apiKey)}`;

            let response;
            try {
                response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });
            } catch (networkErr) {
                throw new Error('接続に失敗しました（ネットワークまたはCORSの問題の可能性があります）');
            }

            if (!response.ok) {
                const errBody = await response.text();
                if (response.status === 429) {
                    throw new Error('利用上限に達しました。しばらく時間を置いてから再度お試しください');
                }
                throw new Error(`Gemini APIエラー (${response.status}): ${errBody.slice(0, 200)}`);
            }

            const data = await response.json();
            const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!text) throw new Error('応答が空でした');
            return text.trim();
        }

        function showAiError(message) {
            const toast = document.createElement('div');
            toast.className = 'goal-toast show';
            toast.style.background = 'var(--color-danger)';
            toast.textContent = '⚠️ ' + message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        // ---- 1. 続きを書く（オートコンプリート） ----
        async function requestContinue() {
            const editor = document.getElementById('editor');
            const text = editor.value;
            if (!text.trim()) return;

            const btn = document.getElementById('continueBtn');
            btn.classList.add('loading');
            btn.disabled = true;
            setAiActive(true);

            try {
                const prompt = `以下の文章の続きを、文体・トーンを保ったまま自然に50字程度で書いてください。地の文のみ出力し、前置きや説明、引用符は一切含めないこと。\n\n---\n${text}`;
                ghostText = await callGemini(prompt);
            } catch (e) {
                setAiActive(false);
                btn.classList.remove('loading');
                btn.disabled = false;
                if (e.message !== 'APIキーが未設定です') showAiError(e.message);
                return;
            }

            btn.classList.remove('loading');
            btn.disabled = false;
            setAiActive(false);
            showGhostText(editor, ghostText);
        }

        function showGhostText(editor, text) {
            const overlay = document.getElementById('ghostOverlay');
            const current = editor.value;
            // 本文部分は visibility:hidden 相当にして高さ・位置だけ合わせ、続き部分のみ見せる
            overlay.innerHTML = '<span style="visibility:hidden">' + escapeHtml(current) + '</span><span class="ghost-text">' + escapeHtml(text) + '</span>';
            document.getElementById('ghostHint').classList.add('show');
            syncOverlayScroll();
        }

        function clearGhostText() {
            ghostText = '';
            document.getElementById('ghostOverlay').innerHTML = '';
            document.getElementById('ghostHint').classList.remove('show');
        }

        function onEditorInput() {
            if (ghostText) clearGhostText();
            scheduleTypoCheck();
        }

        function syncOverlayScroll() {
            const editor = document.getElementById('editor');
            document.getElementById('ghostOverlay').scrollTop = editor.scrollTop;
            document.getElementById('typoOverlay').scrollTop = editor.scrollTop;
        }

        // ---- 2. 誤字脱字チェック ----
        function scheduleTypoCheck() {
            clearTimeout(typoCheckTimer);
            typoCheckTimer = setTimeout(() => {
                // デモでは自動実行はせず、ボタン操作時のみチェックする方針を踏襲。
                // ここでは入力停止を検知するのみで、実行は requestTypoCheck() に委ねる。
            }, 2000);
        }

        async function requestTypoCheck() {
            const editor = document.getElementById('editor');
            const text = editor.value;
            if (!text.trim()) return;

            const btn = document.getElementById('typoBtn');
            btn.classList.add('loading');
            btn.disabled = true;
            setAiActive(true);

            try {
                const prompt = `以下の日本語の文章から、誤字・脱字・明確な文法ミス・表記ゆれのみを検出してください。主観的な言い換え提案は含めないこと。\n` +
                    `JSON配列のみを出力し、それ以外のテキスト（前置き、説明、コードブロック記号）は一切含めないこと。\n` +
                    `各要素は { "original": "誤った箇所の原文そのまま", "suggestion": "修正案", "type": "誤字|脱字|文法|表記ゆれ" } の形式とすること。\n` +
                    `該当箇所がなければ空配列 [] のみを返すこと。\n\n` +
                    `文章:\n${text}`;

                const raw = await callGemini(prompt);
                const found = parseIssuesFromAi(raw, text, 'typo');

                // 誤字チェック結果は既存の誤字マークだけ入れ替え、推敲マークは残す
                typoIssues = typoIssues.filter(t => t.category !== 'typo').concat(found);
            } catch (e) {
                setAiActive(false);
                btn.classList.remove('loading');
                btn.disabled = false;
                if (e.message !== 'APIキーが未設定です') showAiError(e.message || 'チェックに失敗しました');
                return;
            }

            setAiActive(false);
            btn.classList.remove('loading');
            btn.disabled = false;

            renderTypoOverlay();
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // AIの返したJSON文字列から、本文中の位置を特定したissueリストを作る共通処理
        let _issueIdCounter = 0;
        let _aiActiveCount = 0;

        function setAiActive(on) {
            _aiActiveCount = Math.max(0, _aiActiveCount + (on ? 1 : -1));
            document.querySelector('.editor-wrapper').classList.toggle('ai-active', _aiActiveCount > 0);
        }

        function parseIssuesFromAi(raw, text, category) {
            const cleaned = raw.replace(/```json|```/g, '').trim();
            const parsed = JSON.parse(cleaned);
            const issues = [];

            parsed.forEach(item => {
                if (!item.original) return;
                // 大文字小文字を区別せず検索（ただし実際に本文に存在する文字列のままで記録）
                const lowerText = text.toLowerCase();
                const lowerOrig = item.original.toLowerCase();
                let searchFrom = 0;
                let idx;
                while ((idx = lowerText.indexOf(lowerOrig, searchFrom)) !== -1) {
                    issues.push({
                        id: ++_issueIdCounter,
                        start: idx,
                        end: idx + item.original.length,
                        original: text.slice(idx, idx + item.original.length), // 本文中の実際の文字列
                        suggestion: item.suggestion || '',
                        type: item.type || '指摘',
                        category
                    });
                    searchFrom = idx + item.original.length;
                }
            });
            return issues;
        }

        function renderTypoOverlay() {
            const editor = document.getElementById('editor');
            const text = editor.value;
            const overlay = document.getElementById('typoOverlay');

            if (typoIssues.length === 0) {
                overlay.innerHTML = escapeHtml(text);
                return;
            }

            let html = '<span style="visibility:hidden">';
            let cursor = 0;
            typoIssues
                .slice()
                .sort((a, b) => a.start - b.start)
                .forEach(issue => {
                    if (issue.start < cursor) return;
                    html += escapeHtml(text.slice(cursor, issue.start));
                    const cls = issue.category === 'review' ? 'typo-mark review' : 'typo-mark';
                    html += `</span><span class="${cls}" data-id="${issue.id}" onmouseenter="showTypoTooltipById(event, ${issue.id})" onmouseleave="hideTypoTooltip()">${escapeHtml(text.slice(issue.start, issue.end))}</span><span style="visibility:hidden">`;
                    cursor = issue.end;
                });
            html += escapeHtml(text.slice(cursor)) + '</span>';
            overlay.innerHTML = html;
            syncOverlayScroll();
        }

        function showTypoTooltipById(e, id) {
            const issue = typoIssues.find(t => t.id === id);
            if (!issue) return;
            const tooltip = document.getElementById('typoTooltip');
            const wrapper = document.querySelector('.editor-wrapper');
            clearTimeout(tooltip._hideTimer);

            const btnClass = issue.category === 'review' ? 'review-btn' : '';
            const btnLabel = issue.category === 'review' ? '適用する' : '修正する';
            tooltip.innerHTML = `<span class="typo-tooltip-label">${escapeHtml(issue.type)}：「${escapeHtml(issue.original)}」→「${escapeHtml(issue.suggestion)}」</span><button class="${btnClass}" onclick="applyTypoFixById(${id})">${btnLabel}</button>`;

            const rect = e.target.getBoundingClientRect();
            const wrapperRect = wrapper.getBoundingClientRect();
            tooltip.style.left = Math.min(rect.left - wrapperRect.left, wrapperRect.width - 280 - 20) + 'px';
            tooltip.style.top = (rect.bottom - wrapperRect.top + 2) + 'px';
            tooltip.style.paddingTop = '10px';
            tooltip.style.marginTop = '-2px';
            tooltip.classList.add('show');
            tooltip.onmouseenter = () => clearTimeout(tooltip._hideTimer);
            tooltip.onmouseleave = hideTypoTooltip;
        }

        // 旧showTypoTooltipはIDベースに統一したので削除（後方互換のためエイリアス）
        function showTypoTooltip(e, id) { showTypoTooltipById(e, id); }

        function hideTypoTooltip() {
            const tooltip = document.getElementById('typoTooltip');
            tooltip._hideTimer = setTimeout(() => {
                tooltip.classList.remove('show');
            }, 250);
        }

        function applyTypoFixById(id) {
            const issueIdx = typoIssues.findIndex(t => t.id === id);
            if (issueIdx === -1) return;
            const issue = typoIssues[issueIdx];
            const editor = document.getElementById('editor');
            const text = editor.value;

            // 念のため本文中の実際の位置を再検索して照合
            const actualText = text.slice(issue.start, issue.end);
            if (actualText.toLowerCase() !== issue.original.toLowerCase()) {
                // ズレていたら波線だけ消してリセット
                typoIssues.splice(issueIdx, 1);
                document.getElementById('typoTooltip').classList.remove('show');
                renderTypoOverlay();
                return;
            }

            editor.value = text.slice(0, issue.start) + issue.suggestion + text.slice(issue.end);

            const diff = issue.suggestion.length - (issue.end - issue.start);
            typoIssues.splice(issueIdx, 1);
            typoIssues.forEach(t => {
                if (t.start >= issue.end) {
                    t.start += diff;
                    t.end += diff;
                }
            });

            document.getElementById('typoTooltip').classList.remove('show');
            updateStats();
            autoSave();
            renderTypoOverlay();
        }

        // 旧applyTypoFixはIDベースに統一
        function applyTypoFix(id) { applyTypoFixById(id); }

        // ---- 3. 校正・推敲提案（誤字脱字チェックと同じ仕組み・青波線） ----
        async function requestReview() {
            const editor = document.getElementById('editor');
            const text = editor.value;
            if (!text.trim()) return;

            const btn = document.getElementById('reviewBtn');
            btn.classList.add('loading');
            btn.disabled = true;
            setAiActive(true);

            try {
                const prompt = `あなたは日本語の文章の編集者です。以下の文章を読み、改善できる箇所を指摘してください。\n` +
                    `重要なルール:\n` +
                    `- 指摘する原文の該当箇所(original)は、本文中に実際に存在する文字列をそのまま抜き出すこと（30字以内の短い範囲にすること）。\n` +
                    `- 書き換え案(suggestion)は、その該当箇所の自然な代替表現を簡潔に示すこと。\n` +
                    `- 提案の種類を偏らせないこと。「単純に削除する」という提案ばかりにせず、語尾のバリエーション、語順の調整、比喩表現の追加、具体性の強化、漢字とひらがなのバランスなど、多様な観点で指摘すること。\n` +
                    `- 同じ種類の指摘を複数出さないこと。\n` +
                    `JSON配列のみを出力し、それ以外のテキスト（前置き、説明、コードブロック記号）は一切含めないこと。\n` +
                    `各要素は { "original": "本文中の該当箇所", "suggestion": "改善案", "type": "指摘の種類(例: 語尾の単調さ, 冗長表現, 漢字とひらがなのバランス など)" } の形式とすること。\n` +
                    `本当に改善の余地がなければ空配列 [] を返すこと。指摘は2〜4件程度。\n\n` +
                    `文章:\n${text}`;

                const raw = await callGemini(prompt);
                const found = parseIssuesFromAi(raw, text, 'review');

                // 推敲提案は毎回再生成。既存の推敲マークだけ入れ替え、誤字マークは残す
                typoIssues = typoIssues.filter(t => t.category !== 'review').concat(found);

                if (found.length === 0) {
                    showAiError('特に気になる点は見つかりませんでした');
                }
            } catch (e) {
                setAiActive(false);
                btn.classList.remove('loading');
                btn.disabled = false;
                if (e.message !== 'APIキーが未設定です') showAiError(e.message || '推敲提案の取得に失敗しました');
                return;
            }

            setAiActive(false);
            btn.classList.remove('loading');
            btn.disabled = false;

            renderTypoOverlay();
        }

        // ============================================
        // Recall システム
        // ============================================

        let _recallSnapshots   = [];  // { id, ts, content } 新しい順
        let _recallPreviewIdx  = -1;
        let _recallIntervalSec = 60;
        let _recallIntervalTimer = null;
        let _recallIdleTimer     = null;

        // IDB起動後にDOMContentLoadedから呼ばれる
        async function recallInit() {
            _recallSnapshots = await snapshotLoadAll();
            initRecallTrack();
            updateRecallUI();
            startRecallIntervalTimer();
        }

        // ---- スナップショット保存 ----
        async function recallSave() {
            const text = document.getElementById('editor').value;
            if (!text.trim()) return;
            if (_recallSnapshots.length > 0 && _recallSnapshots[0].content === text) return;

            const ts = Date.now();
            await snapshotInsert(ts, text);
            _recallSnapshots.unshift({ id: ts, ts, content: text });
            if (_recallSnapshots.length > 100) _recallSnapshots.pop();
            updateRecallUI();
        }

        // ---- UIの更新 ----
        // ---- カスタムシークバー ----
        let _recallDragging = false;

        function recallSetThumb(idx) {
            const n = _recallSnapshots.length;
            const track = document.getElementById('recallTrack');
            if (!track) return;
            const trackH = track.clientHeight || 180;
            const pct = n <= 1 ? 0 : idx / (n - 1);
            const topPx = pct * trackH;
            document.getElementById('recallThumb').style.top = topPx + 'px';
            document.getElementById('recallTrackFill').style.height = topPx + 'px';
        }

        function recallIdxFromY(clientY) {
            const track = document.getElementById('recallTrack');
            const rect = track.getBoundingClientRect();
            const pct = Math.max(0, Math.min(1, (clientY - rect.top) / rect.height));
            const n = _recallSnapshots.length;
            return Math.round(pct * (n - 1));
        }

        function initRecallTrack() {
            const track = document.getElementById('recallTrack');
            const thumb = document.getElementById('recallThumb');
            if (!track) return;

            const onMove = (clientY) => {
                const idx = recallIdxFromY(clientY);
                recallSetThumb(idx);
                onRecallSlide(idx);
            };

            track.addEventListener('mousedown', (e) => {
                _recallDragging = true;
                onMove(e.clientY);
                e.preventDefault();
            });
            thumb.addEventListener('mousedown', (e) => {
                _recallDragging = true;
                e.preventDefault();
                e.stopPropagation();
            });
            document.addEventListener('mousemove', (e) => {
                if (!_recallDragging) return;
                onMove(e.clientY);
            });
            document.addEventListener('mouseup', () => { _recallDragging = false; });

            track.addEventListener('touchstart', (e) => {
                _recallDragging = true;
                onMove(e.touches[0].clientY);
                e.preventDefault();
            }, { passive: false });
            document.addEventListener('touchmove', (e) => {
                if (!_recallDragging) return;
                onMove(e.touches[0].clientY);
            });
            document.addEventListener('touchend', () => { _recallDragging = false; });
        }

        function updateRecallUI() {
            const count   = document.getElementById('recallCount');
            const display = document.getElementById('recallTimeDisplay');
            const n = _recallSnapshots.length;
            count.textContent = n + '件';

            if (n === 0) {
                display.textContent = '—';
                recallSetThumb(0);
            } else if (_recallPreviewIdx === -1) {
                display.textContent = formatRecallTime(_recallSnapshots[0].ts);
                recallSetThumb(0);
            }
        }

        function formatRecallTime(ts) {
            const d = new Date(ts);
            const hh = String(d.getHours()).padStart(2,'0');
            const mm = String(d.getMinutes()).padStart(2,'0');
            const ss = String(d.getSeconds()).padStart(2,'0');
            return `${hh}:${mm}:${ss}`;
        }

        function onRecallSlide(idx) {
            const n = _recallSnapshots.length;
            if (n === 0) return;
            idx = Math.max(0, Math.min(n - 1, idx));
            const snap = _recallSnapshots[idx];
            if (!snap) return;
            document.getElementById('recallTimeDisplay').textContent = formatRecallTime(snap.ts);
            if (idx === 0) {
                clearRecallPreview();
                return;
            }
            _recallPreviewIdx = idx;
            showRecallPreview(snap.content);
        }

        function showRecallPreview(oldContent) {
            const overlay = document.getElementById('recallOverlay');
            const wrapper = document.querySelector('.editor-wrapper');
            overlay.innerHTML = '<span class="recall-preview-text">' + escapeHtml(oldContent) + '</span>';
            wrapper.classList.add('recall-previewing');
            document.getElementById('recallHint').classList.add('show');
            document.getElementById('recallBar').classList.add('force-show');
        }

        function clearRecallPreview() {
            _recallPreviewIdx = -1;
            const wrapper = document.querySelector('.editor-wrapper');
            document.getElementById('recallOverlay').innerHTML = '';
            wrapper.classList.remove('recall-previewing');
            document.getElementById('recallHint').classList.remove('show');
            document.getElementById('recallBar').classList.remove('force-show');
        }

        function onEditorKeydown(e) {
            // Recall プレビュー中の操作
            if (_recallPreviewIdx !== -1) {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    const snap = _recallSnapshots[_recallPreviewIdx];
                    recallSave().then(() => {
                        document.getElementById('editor').value = snap.content;
                        updateStats();
                        autoSave();
                        clearRecallPreview();
                        recallSetThumb(0);
                        updateRecallUI();
                    });
                    return;
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    clearRecallPreview();
                    recallSetThumb(0);
                    updateRecallUI();
                    return;
                }
            }
            // Ghost text の既存処理
            if (ghostText) {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    const editor = document.getElementById('editor');
                    editor.value += ghostText;
                    clearGhostText();
                    updateStats();
                    autoSave();
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    clearGhostText();
                } else if (e.key.length === 1 || e.key === 'Backspace' || e.key === 'Enter') {
                    clearGhostText();
                }
            }
        }

        // ---- 自動保存トリガー群 ----

        // 1. 入力停止10秒後
        function recallIdleReset() {
            clearTimeout(_recallIdleTimer);
            _recallIdleTimer = setTimeout(saveAll, 10000);
        }

        // 2. ユーザー設定間隔タイマー
        function startRecallIntervalTimer() {
            if (_recallIntervalTimer) clearInterval(_recallIntervalTimer);
            _recallIntervalTimer = setInterval(saveAll, _recallIntervalSec * 1000);
        }

        // 手動保存ボタン
        async function recallManualSave() {
            const btn = document.getElementById('recallSaveBtn');
            btn.disabled = true;
            await saveAll();
            btn.textContent = '✅';
            btn.classList.add('saved');
            setTimeout(() => {
                btn.textContent = '💾';
                btn.classList.remove('saved');
                btn.disabled = false;
            }, 1200);
        }

        async function recallClearAll() {
            await snapshotClearAll();
            _recallSnapshots = [];
            clearRecallPreview();
            updateRecallUI();
        }

        function setRecallInterval(sec) {
            sec = parseInt(sec, 10);
            _recallIntervalSec = sec;
            idbPut('settings', sec, 'recallInterval');
            startRecallIntervalTimer();
            document.querySelectorAll('.recall-interval-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.sec) === sec);
            });
        }

        // ページを閉じるとき
        // pagehide: saveAll を呼ぶ（非同期だがブラウザが可能な限り実行する）
        window.addEventListener('pagehide', () => { saveAll(); });
        // visibilitychange: タブを隠した・切り替えたタイミングでも保存
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') saveAll();
        });
    </script>
</body>
</html>
