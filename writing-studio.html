<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WritingStudio - 執筆専用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-bg: #FFFFFF;
            --color-surface: #FAFAF8;
            --color-surface-light: #F5F5F5;
            --color-text: #1A1A1A;
            --color-text-secondary: #6B7280;
            --color-accent: #6366F1;
            --color-accent-light: #EEF2FF;
            --color-border: #E5E5E5;
            --color-success: #10B981;
            --color-danger: #EF4444;
            --color-warning: #F59E0B;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.07);
            --shadow-lg: 0 10px 15px rgba(0,0,0,0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            height: 100vh;
            overflow: hidden;
            line-height: 1.6;
            transition: background-color 0.2s ease-out, color 0.2s ease-out;
        }

        /* Background themes */
        body.bg-white { 
            background-color: #FFFFFF;
            --color-bg: #FFFFFF;
            --color-surface: #FAFAF8;
            --color-border: #E5E5E5;
            --color-text: #1A1A1A;
            color: #1A1A1A;
        }
        body.bg-cream { 
            background-color: #FAF6EE;
            --color-bg: #FAF6EE;
            --color-surface: #F5EFE3;
            --color-border: #E8DFD0;
            --color-text: #2D2416;
            color: #2D2416;
        }
        body.bg-gray { 
            background-color: #F0F0F0;
            --color-bg: #F0F0F0;
            --color-surface: #E8E8E8;
            --color-border: #D8D8D8;
            --color-text: #1A1A1A;
            color: #1A1A1A;
        }
        body.bg-dark { 
            background-color: #1E1E1E;
            --color-bg: #1E1E1E;
            --color-surface: #2A2A2A;
            --color-border: #3A3A3A;
            --color-text: #E5E5E5;
            color: #E5E5E5;
        }
        body.bg-mint { 
            background-color: #EFFAF6;
            --color-bg: #EFFAF6;
            --color-surface: #E0F3EA;
            --color-border: #C8E6DC;
            --color-text: #1A3A2E;
            color: #1A3A2E;
        }

        /* Font themes */
        body.font-serif textarea { font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'MS PMincho', serif; }
        body.font-mincho textarea { font-family: 'Georgia', 'Times New Roman', serif; }
        body.font-rounded textarea { font-family: 'Hiragino Maru Gothic ProN', 'UD Digi Kyokasho N-R', 'Comic Sans MS', sans-serif; }
        body.font-mono textarea { font-family: 'SF Mono', 'MS Gothic', Consolas, monospace; }

        /* Layout */
        .container {
            display: flex;
            height: 100vh;
            background: var(--color-bg);
            transition: background-color 0.2s ease-out;
        }

        .sidebar {
            display: none;
        }

        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            padding: 20px 32px;
            border-bottom: 1px solid var(--color-border);
            display: none;
            justify-content: space-between;
            align-items: center;
            background: var(--color-bg);
            animation: fadeIn 0.5s ease-out;
        }

        .title-area {
            flex: 1;
        }

        .document-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
            color: var(--color-text);
        }

        .document-title:hover {
            color: var(--color-accent);
        }

        .document-info {
            font-size: 13px;
            color: var(--color-text-secondary);
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .editor-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 40px;
            position: relative;
        }

        .editor-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        textarea {
            flex: 1;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 16px;
            line-height: 1.8;
            border: 1px solid var(--color-border);
            border-radius: 12px;
            background: var(--color-surface);
            color: var(--color-text);
            resize: none;
            outline: none;
            transition: background-color 0.2s ease-out, color 0.2s ease-out, border-color 0.2s ease-out;
            letter-spacing: 0.3px;
        }

        textarea:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px var(--color-accent-light);
        }

        /* Stats Bar */
        .stats-trigger {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 480px;
            height: 80px;
            z-index: 39;
        }

        .stats-bar {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%) scale(0.85);
            width: auto;
            padding: 10px 20px;
            background: rgba(26, 26, 26, 0.8);
            border-radius: 999px;
            display: flex;
            align-items: center;
            gap: 20px;
            opacity: 0;
            transition: opacity 0.25s ease-out, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            z-index: 40;
            box-shadow: var(--shadow-lg);
        }

        .stats-trigger:hover .stats-bar {
            opacity: 1;
            transform: translateX(-50%) scale(1);
            pointer-events: auto;
        }

        .settings-trigger {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 480px;
            height: 80px;
            z-index: 39;
        }

        .settings-bar {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%) scale(0.85);
            width: auto;
            padding: 10px 20px;
            background: rgba(26, 26, 26, 0.8);
            border-radius: 999px;
            display: flex;
            align-items: center;
            gap: 16px;
            opacity: 0;
            transition: opacity 0.25s ease-out, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            z-index: 40;
            box-shadow: var(--shadow-lg);
        }

        .settings-trigger:hover .settings-bar {
            opacity: 1;
            transform: translateX(-50%) scale(1);
            pointer-events: auto;
        }

        .settings-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .settings-group span {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            white-space: nowrap;
        }

        .settings-bar select {
            display: none;
        }

        .swatch-row {
            display: flex;
            gap: 6px;
        }

        .bg-swatch {
            width: 26px;
            height: 26px;
            border-radius: 7px;
            border: 2px solid rgba(255,255,255,0.15);
            cursor: pointer;
            transition: var(--transition);
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bg-swatch-inner {
            width: 100%;
            height: 100%;
            border-radius: 3px;
        }

        .bg-swatch.active {
            border-color: var(--color-accent);
        }

        .font-swatch {
            width: 26px;
            height: 26px;
            border-radius: 7px;
            border: 2px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.1);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: var(--transition);
            padding: 0;
        }

        .font-swatch.active {
            border-color: var(--color-accent);
            background: rgba(99,102,241,0.25);
        }

        .bg-swatch[data-bg="dark"] {
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1);
        }

        .stats-bar .stat-item {
            display: flex;
            align-items: baseline;
            gap: 5px;
            padding: 0;
            white-space: nowrap;
        }

        .stats-bar .stat-number {
            color: #fff;
            font-size: 14px;
        }

        .stats-bar .stat-label {
            color: rgba(255,255,255,0.5);
            font-size: 10px;
            margin-top: 0;
        }

        .stat-item {
            text-align: center;
            padding: 8px 0;
        }

        .stat-number {
            font-size: 20px;
            font-weight: 700;
            color: var(--color-accent);
            font-feature-settings: "tnum";
        }

        .stat-label {
            font-size: 11px;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-top: 2px;
            font-weight: 500;
        }

        .btn-export {
            padding: 6px 10px;
            font-size: 12px;
            background: var(--color-accent);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            white-space: nowrap;
        }

        .btn-export:hover {
            background: #5558E3;
        }

        .goal-input-row {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .goal-input-row input {
            width: 90px;
            padding: 5px 8px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            font-size: 12px;
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .goal-input-row input::-webkit-outer-spin-button,
        .goal-input-row input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .goal-input-row input[type=number] {
            -moz-appearance: textfield;
        }

        .goal-input-row button {
            padding: 5px 8px;
            font-size: 12px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            cursor: pointer;
            color: #fff;
            white-space: nowrap;
        }

        .goal-ring-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .goal-ring {
            width: 56px;
            height: 32px;
            flex-shrink: 0;
            position: relative;
        }

        .goal-ring svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .goal-ring-track {
            fill: none;
            stroke: rgba(255,255,255,0.2);
            stroke-width: 4;
        }

        .goal-ring-progress {
            fill: none;
            stroke: var(--color-accent);
            stroke-width: 4;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.3s ease-out;
        }

        .goal-ring-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 9px;
            font-weight: 700;
            color: #fff;
        }

        .goal-text {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            white-space: nowrap;
        }

        .goal-clear {
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            font-size: 10px;
            cursor: pointer;
            text-decoration: underline;
            white-space: nowrap;
        }

        /* Goal achieved toast */
        .goal-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--color-success);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s ease-out, transform 0.3s ease-out;
            pointer-events: none;
            z-index: 100;
        }

        .goal-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Sidebar */
        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--color-text-secondary);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .sidebar-content::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar-content::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 3px;
        }

        .sidebar-content::-webkit-scrollbar-thumb:hover {
            background: var(--color-text-secondary);
        }

        .doc-item {
            padding: 12px 12px;
            margin-bottom: 8px;
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: space-between;
            align-items: center;
            group: "doc-item";
        }

        .doc-item:hover {
            border-color: var(--color-accent);
            background: var(--color-accent-light);
            box-shadow: var(--shadow-sm);
        }

        .doc-item.active {
            border-color: var(--color-accent);
            background: var(--color-accent-light);
            font-weight: 600;
        }

        .doc-item-name {
            font-size: 13px;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .doc-item-delete {
            width: 24px;
            height: 24px;
            border: none;
            background: transparent;
            color: var(--color-danger);
            cursor: pointer;
            font-size: 16px;
            opacity: 0;
            transition: opacity 0.2s;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }

        .doc-item:hover .doc-item-delete {
            opacity: 1;
        }

        .doc-item-delete:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        .sidebar-footer {
            padding: 16px 12px;
            border-top: 1px solid var(--color-border);
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }

        /* Buttons */
        button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            outline: none;
            position: relative;
        }

        .btn-primary {
            background: var(--color-accent);
            color: white;
        }

        .btn-primary:hover {
            background: #5558E3;
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--color-surface-light);
            color: var(--color-text);
            border: 1px solid var(--color-border);
        }

        .btn-secondary:hover {
            background: var(--color-border);
            box-shadow: var(--shadow-sm);
        }

        .btn-small {
            padding: 6px 10px;
            font-size: 12px;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            background: var(--color-surface-light);
            border: 1px solid var(--color-border);
            color: var(--color-text);
        }

        .btn-icon:hover {
            background: var(--color-border);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 100;
            animation: fadeIn 0.2s ease-out;
            backdrop-filter: blur(2px);
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--color-bg);
            border-radius: 12px;
            padding: 32px;
            max-width: 400px;
            width: 90%;
            box-shadow: var(--shadow-lg);
            animation: scaleIn 0.3s ease-out;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes countUp {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
            }

            .editor-section {
                padding: 20px;
            }

            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Main Area -->
        <div class="main-area">

            <!-- Editor -->
            <div class="editor-section">
                <div class="editor-wrapper">
                    <textarea 
                        id="editor" 
                        placeholder="執筆を始めましょう。ここは邪魔なものはありません。"
                        oninput="updateStats(); autoSave()"
                    ></textarea>
                </div>
            </div>
        </div>

        <!-- Stats Bar -->
        <div class="stats-trigger">
        <div class="stats-bar" id="statsBar">
            <div class="stat-item">
                <div class="stat-number" id="charCount">0</div>
                <div class="stat-label">文字数</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="wordCount">0</div>
                <div class="stat-label">単語数</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="lineCount">0</div>
                <div class="stat-label">行数</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="readTime">0</div>
                <div class="stat-label">読了時間</div>
            </div>
            <div class="goal-input-row" id="goalInputRow">
                <input type="number" id="goalInput" placeholder="目標文字数" min="1">
                <button onclick="setGoalTarget()">設定</button>
            </div>
            <div class="goal-ring-wrap" id="goalRingWrap" style="display:none;">
                <div class="goal-ring" id="goalRing">
                    <svg viewBox="0 0 56 32">
                        <rect class="goal-ring-track" x="4" y="4" width="48" height="24" rx="12" ry="12" pathLength="100"/>
                        <rect class="goal-ring-progress" id="goalRingProgress" x="4" y="4" width="48" height="24" rx="12" ry="12" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
                    </svg>
                    <div class="goal-ring-text" id="goalRingText">0%</div>
                </div>
                <div>
                    <div class="goal-text" id="goalText">0 / 0字</div>
                    <button class="goal-clear" onclick="clearGoalTarget()">目標を解除</button>
                </div>
            </div>
            <button class="btn-export" onclick="exportMD()">📄 MD出力</button>
        </div>
        </div>

        <!-- Goal Achieved Toast -->
        <div class="goal-toast" id="goalToast">🎉 目標達成しました！</div>

        <!-- Settings Bar -->
        <div class="settings-trigger">
        <div class="settings-bar" id="settingsBar">
            <div class="settings-group">
                <span>背景</span>
                <div class="swatch-row" id="bgSwatches">
                    <button class="bg-swatch" data-bg="white" style="background:#FFFFFF" onclick="applyBg('white')" title="白"><div class="bg-swatch-inner" style="background:#FAFAF8"></div></button>
                    <button class="bg-swatch" data-bg="cream" style="background:#FAF6EE" onclick="applyBg('cream')" title="クリーム"><div class="bg-swatch-inner" style="background:#F5EFE3"></div></button>
                    <button class="bg-swatch" data-bg="gray" style="background:#F0F0F0" onclick="applyBg('gray')" title="グレー"><div class="bg-swatch-inner" style="background:#E8E8E8"></div></button>
                    <button class="bg-swatch" data-bg="dark" style="background:#1E1E1E" onclick="applyBg('dark')" title="ダーク"><div class="bg-swatch-inner" style="background:#2A2A2A"></div></button>
                    <button class="bg-swatch" data-bg="mint" style="background:#EFFAF6" onclick="applyBg('mint')" title="ミント"><div class="bg-swatch-inner" style="background:#E0F3EA"></div></button>
                </div>
            </div>
            <div class="settings-group">
                <span>フォント</span>
                <div class="swatch-row" id="fontSwatches">
                    <button class="font-swatch" data-font="system" style="font-family:-apple-system,sans-serif" onclick="applyFont('system')" title="ゴシック">あ</button>
                    <button class="font-swatch" data-font="serif" style="font-family:'Hiragino Mincho ProN','Yu Mincho','MS PMincho',serif" onclick="applyFont('serif')" title="明朝">あ</button>
                    <button class="font-swatch" data-font="mincho" style="font-family:'Georgia','Times New Roman',serif" onclick="applyFont('mincho')" title="セリフ">あ</button>
                    <button class="font-swatch" data-font="rounded" style="font-family:'Hiragino Maru Gothic ProN','UD Digi Kyokasho N-R','Comic Sans MS',sans-serif" onclick="applyFont('rounded')" title="丸ゴシック">あ</button>
                    <button class="font-swatch" data-font="mono" style="font-family:'SF Mono','MS Gothic',Consolas,monospace" onclick="applyFont('mono')" title="等幅">あ</button>
                </div>
            </div>
        </div>
        </div>

    <script>
        // State Management
        let content = localStorage.getItem('writing') || '';
        let goalTarget = parseInt(localStorage.getItem('goalTarget')) || 0;
        let goalAchievedShown = false;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            const editor = document.getElementById('editor');
            editor.value = content;
            if (goalTarget > 0) {
                document.getElementById('goalInput').value = goalTarget;
            }
            updateStats();

            const savedBg = localStorage.getItem('bgTheme') || 'white';
            const savedFont = localStorage.getItem('fontTheme') || 'system';
            document.body.classList.add('bg-' + savedBg);
            if (savedFont !== 'system') document.body.classList.add('font-' + savedFont);
            document.querySelector(`.bg-swatch[data-bg="${savedBg}"]`).classList.add('active');
            document.querySelector(`.font-swatch[data-font="${savedFont}"]`).classList.add('active');
        });

        function applyBg(val) {
            document.body.classList.remove('bg-white','bg-cream','bg-gray','bg-dark','bg-mint');
            document.body.classList.add('bg-' + val);
            localStorage.setItem('bgTheme', val);
            document.querySelectorAll('.bg-swatch').forEach(el => el.classList.remove('active'));
            document.querySelector(`.bg-swatch[data-bg="${val}"]`).classList.add('active');
        }

        function applyFont(val) {
            document.body.classList.remove('font-serif','font-mincho','font-rounded','font-mono');
            if (val !== 'system') document.body.classList.add('font-' + val);
            localStorage.setItem('fontTheme', val);
            document.querySelectorAll('.font-swatch').forEach(el => el.classList.remove('active'));
            document.querySelector(`.font-swatch[data-font="${val}"]`).classList.add('active');
        }

        // Stats Update
        function updateStats() {
            const text = document.getElementById('editor').value;
            
            const charCount = text.length;
            document.getElementById('charCount').textContent = charCount.toLocaleString('ja-JP');

            const lineCount = text ? text.split('\n').length : 0;
            document.getElementById('lineCount').textContent = lineCount;

            const wordCount = countWords(text);
            document.getElementById('wordCount').textContent = wordCount;

            const readTime = Math.ceil(charCount / 300);
            document.getElementById('readTime').textContent = readTime + '分';

            updateGoalProgress(charCount);
        }

        function updateGoalProgress(charCount) {
            const inputRow = document.getElementById('goalInputRow');
            const ringWrap = document.getElementById('goalRingWrap');

            if (goalTarget > 0) {
                inputRow.style.display = 'none';
                ringWrap.style.display = 'flex';

                const pct = Math.min(Math.round((charCount / goalTarget) * 100), 100);
                document.getElementById('goalRingProgress').style.strokeDashoffset = (100 - pct);
                document.getElementById('goalRingText').textContent = pct + '%';
                document.getElementById('goalText').textContent = `${charCount.toLocaleString('ja-JP')} / ${goalTarget.toLocaleString('ja-JP')}字`;

                if (pct >= 100 && !goalAchievedShown) {
                    goalAchievedShown = true;
                    showGoalToast();
                } else if (pct < 100) {
                    goalAchievedShown = false;
                }
            } else {
                inputRow.style.display = 'flex';
                ringWrap.style.display = 'none';
            }
        }

        function setGoalTarget() {
            const val = parseInt(document.getElementById('goalInput').value);
            if (!val || val <= 0) return;
            goalTarget = val;
            goalAchievedShown = false;
            localStorage.setItem('goalTarget', goalTarget);
            updateStats();
        }

        function clearGoalTarget() {
            goalTarget = 0;
            localStorage.removeItem('goalTarget');
            document.getElementById('goalInput').value = '';
            updateStats();
        }

        function showGoalToast() {
            const toast = document.getElementById('goalToast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function countWords(text) {
            // 日本語テキストの単語数カウント（文字数を参考値として）
            const hiragana = text.match(/[\u3040-\u309F]/g) || [];
            const katakana = text.match(/[\u30A0-\u30FF]/g) || [];
            const kanji = text.match(/[\u4E00-\u9FFF]/g) || [];
            const english = text.match(/[a-zA-Z]+/g) || [];
            
            return Math.max(1, Math.floor((hiragana.length + katakana.length + kanji.length) / 3 + english.length));
        }

        // Auto Save
        function autoSave() {
            content = document.getElementById('editor').value;
            localStorage.setItem('writing', content);
        }

        function exportMD() {
            const text = document.getElementById('editor').value;
            const md = text;
            const blob = new Blob([md], { type: 'text/markdown; charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = '執筆.md';
            link.click();
        }

        // Export & Download

        // Auto-save timer
        setInterval(autoSave, 5000);
    </script>
</body>
</html>
